global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: library-prep-alpha

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: host
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { host: control }
      - targets: ["10.77.0.2:9100"]
        labels: { host: worker-5090 }
      - targets: ["10.77.0.3:9100"]
        labels: { host: worker-4090-01 }
      - targets: ["10.77.0.4:9100"]
        labels: { host: worker-4090-02 }
      - targets: ["10.77.0.5:9100"]
        labels: { host: worker-4090-03 }
      - targets: ["10.77.0.6:9100"]
        labels: { host: worker-4090-04 }
      - targets: ["10.77.0.7:9100"]
        labels: { host: worker-4090-05 }

  - job_name: api_health
    metrics_path: /probe
    params: { module: [api_mtls] }
    static_configs:
      - targets: ["https://10.77.0.1:8443/readyz"]
        labels: { service: api }
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: storage_health
    metrics_path: /probe
    params: { module: [s3_mtls] }
    static_configs:
      - targets: ["https://10.77.0.2/"]
        labels: { service: storage-a }
      - targets: ["https://10.77.0.3/"]
        labels: { service: storage-b }
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
