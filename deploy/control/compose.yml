name: library-prep-control

services:
  postgres:
    image: ${POSTGRES_IMAGE:?immutable POSTGRES_IMAGE is required}
    restart: unless-stopped
    environment:
      POSTGRES_DB: library_prep
      POSTGRES_USER: library_prep
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD:?AUTHENTIK_DB_PASSWORD is required}
      SEAWEED_FILER_DB_PASSWORD: ${SEAWEED_FILER_DB_PASSWORD:?SEAWEED_FILER_DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --data-checksums
      PGDATA: /var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - archive_command=pgbackrest --stanza=library-prep archive-push %p
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/20-platform-databases.sh:ro
      - /etc/library-prep/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - /etc/library-prep/pgbackrest-ssh:/var/lib/postgresql/.ssh:ro
      - pgbackrest-spool:/var/spool/pgbackrest
    ports:
      - "${CONTROL_INTERNAL_IP:-10.77.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_prep -d library_prep"]
      interval: 10s
      timeout: 5s
      retries: 12
    stop_grace_period: 2m
    networks: [control]

  backup-init:
    image: ${POSTGRES_IMAGE:?immutable POSTGRES_IMAGE is required}
    restart: "no"
    user: postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/usr/local/bin/backup-init"]
    environment:
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data:ro
      - /etc/library-prep/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - /etc/library-prep/pgbackrest-ssh:/var/lib/postgresql/.ssh:ro
      - ./backup-init.sh:/usr/local/bin/backup-init:ro
      - pgbackrest-spool:/var/spool/pgbackrest
    networks: [control]

  migrate:
    image: ${POSTGRES_IMAGE:?immutable POSTGRES_IMAGE is required}
    restart: "no"
    depends_on:
      backup-init:
        condition: service_completed_successfully
    environment:
      PGHOST: postgres
      PGDATABASE: library_prep
      PGUSER: library_prep
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ../../migrations:/migrations:ro
      - ./migrate.sh:/usr/local/bin/platform-migrate:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/platform-migrate"]
    networks: [control]

  nats:
    image: ${NATS_IMAGE:?immutable NATS_IMAGE is required}
    restart: unless-stopped
    command: ["--config", "/etc/nats/nats.conf"]
    volumes:
      - nats-data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
      - /etc/library-prep/pki:/etc/library-prep/pki:ro
    group_add: ["65200"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    stop_signal: SIGTERM
    stop_grace_period: 1m
    network_mode: host

  storage-init:
    image: ${STORAGE_INIT_IMAGE:?immutable STORAGE_INIT_IMAGE is required}
    restart: "no"
    env_file: /etc/library-prep/storage-init.env
    environment:
      INTERNAL_CA_FILE: /pki/ca.crt
      INTERNAL_CERT_FILE: /pki/storage-init.crt
      INTERNAL_KEY_FILE: /pki/storage-init.key
      S3_INTERNAL_URL: https://${OBJECTS_DOMAIN}
      S3_PUBLIC_URL: https://${OBJECTS_DOMAIN}
    volumes:
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    extra_hosts:
      - "${OBJECTS_DOMAIN}:10.77.0.2"
      - "${OBJECTS_DOMAIN}:10.77.0.3"
    networks: [control]

  api:
    image: ${API_IMAGE:?immutable API_IMAGE is required}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    env_file: /etc/library-prep/control.env
    environment:
      LISTEN_ADDRESS: :8443
      INTERNAL_CA_FILE: /pki/ca.crt
      INTERNAL_CERT_FILE: /pki/api.crt
      INTERNAL_KEY_FILE: /pki/api.key
      S3_INTERNAL_URL: https://${OBJECTS_DOMAIN}
      S3_PUBLIC_URL: https://${OBJECTS_DOMAIN}
      GLOBAL_STORAGE_CEILING_BYTES: "800000000000"
    volumes:
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    extra_hosts:
      - "${OBJECTS_DOMAIN}:10.77.0.2"
      - "${OBJECTS_DOMAIN}:10.77.0.3"
    ports:
      - "${CONTROL_INTERNAL_IP:-10.77.0.1}:8443:8443"
    healthcheck:
      test: ["CMD", "/usr/local/bin/service", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
    stop_signal: SIGTERM
    stop_grace_period: 45s
    networks: [control]

  scheduler:
    image: ${SCHEDULER_IMAGE:?immutable SCHEDULER_IMAGE is required}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    env_file: /etc/library-prep/control.env
    environment:
      INTERNAL_CA_FILE: /pki/ca.crt
      INTERNAL_CERT_FILE: /pki/scheduler.crt
      INTERNAL_KEY_FILE: /pki/scheduler.key
    volumes:
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    stop_signal: SIGTERM
    stop_grace_period: 1m
    networks: [control]

  garbage-collector:
    image: ${GC_IMAGE:?immutable GC_IMAGE is required}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: /etc/library-prep/gc.env
    environment:
      INTERNAL_CA_FILE: /pki/ca.crt
      INTERNAL_CERT_FILE: /pki/gc.crt
      INTERNAL_KEY_FILE: /pki/gc.key
      S3_INTERNAL_URL: https://${OBJECTS_DOMAIN}
      S3_ARTIFACT_BUCKET: library-artifacts
    volumes:
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    extra_hosts:
      - "${OBJECTS_DOMAIN}:10.77.0.2"
      - "${OBJECTS_DOMAIN}:10.77.0.3"
    stop_signal: SIGTERM
    stop_grace_period: 1m
    networks: [control]

  prometheus:
    image: ${PROMETHEUS_IMAGE:?immutable PROMETHEUS_IMAGE is required}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.listen-address=:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    stop_signal: SIGTERM
    stop_grace_period: 1m
    networks: [control]

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:?immutable BLACKBOX_EXPORTER_IMAGE is required}
    restart: unless-stopped
    user: "65532:65532"
    command: ["--config.file=/etc/blackbox/blackbox.yml", "--web.listen-address=:9115"]
    volumes:
      - ./blackbox.yml:/etc/blackbox/blackbox.yml:ro
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    networks: [control]

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:?immutable NODE_EXPORTER_IMAGE is required}
    restart: unless-stopped
    user: "65532:65532"
    pid: host
    command:
      - --path.rootfs=/host
      - --web.listen-address=:9100
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    security_opt: [no-new-privileges:true]
    networks: [control]

  web:
    image: ${WEB_IMAGE:?immutable WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file: /etc/library-prep/web.env
    volumes:
      - /etc/library-prep/pki:/pki:ro
    group_add: ["65200"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 5
    stop_signal: SIGTERM
    stop_grace_period: 30s
    networks: [control]

  authentik-server:
    image: ${AUTHENTIK_IMAGE:?immutable AUTHENTIK_IMAGE is required}
    restart: unless-stopped
    command: server
    env_file: /etc/library-prep/authentik.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    networks: [control]

  authentik-worker:
    image: ${AUTHENTIK_IMAGE:?immutable AUTHENTIK_IMAGE is required}
    restart: unless-stopped
    command: worker
    env_file: /etc/library-prep/authentik.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs
    stop_grace_period: 1m
    networks: [control]

  caddy:
    image: ${CADDY_IMAGE:?immutable CADDY_IMAGE is required}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      OBJECTS_DOMAIN: ${OBJECTS_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/library-prep/pki:/etc/library-prep/pki:ro
      - caddy-data:/data
      - caddy-config:/config
    group_add: ["65200"]
    stop_grace_period: 30s
    networks: [control]

networks:
  control:
    driver: bridge

volumes:
  postgres-data:
  pgbackrest-spool:
  nats-data:
  authentik-media:
  authentik-templates:
  authentik-certs:
  caddy-data:
  caddy-config:
  prometheus-data:
