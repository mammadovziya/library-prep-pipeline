server_name: control
listen: 10.77.0.1:4222
http: 127.0.0.1:8222
pid_file: /var/run/nats/nats.pid

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 2GB
  max_file_store: 100GB
}

tls {
  cert_file: /etc/library-prep/pki/nats.crt
  key_file: /etc/library-prep/pki/nats.key
  ca_file: /etc/library-prep/pki/ca.crt
  verify: true
  verify_and_map: true
  timeout: 3
}

authorization {
  users: [
    { user: scheduler, permissions: { publish: ["tasks.>", "events.>", "dlq.>", "$JS.API.>", "$JS.ACK.TASK_ADVISORIES.>"], subscribe: ["$JS.EVENT.ADVISORY.CONSUMER.MAX_DELIVERIES.>", "_INBOX.>"] } },
    { user: worker-5090, permissions: { publish: ["$JS.API.CONSUMER.INFO.TASKS.workers_gpu", "$JS.API.CONSUMER.INFO.TASKS.workers_cpu", "$JS.API.CONSUMER.MSG.NEXT.TASKS.workers_gpu", "$JS.ACK.TASKS.>", "$JS.API.CONSUMER.MSG.NEXT.TASKS.workers_cpu"], subscribe: ["_INBOX.>"] } },
    { user: worker-4090-01, permissions: { publish: ["$JS.API.CONSUMER.INFO.TASKS.workers_gpu", "$JS.API.CONSUMER.MSG.NEXT.TASKS.workers_gpu", "$JS.ACK.TASKS.>"], subscribe: ["_INBOX.>"] } }
  ]
}
